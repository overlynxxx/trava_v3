      <h1>Загородный клуб TRAVA — Ленинградская область</h1>
      <p><strong>Загородный клуб «Трава»</strong> — база отдыха в сосновом лесу в 1,5 часах от Санкт-Петербурга. 18 коттеджей, две бани с джакузи под открытым небом, ресторан, мини-зоопарк и территория для семейного отдыха и корпоративных мероприятий. Открыт круглый год, размещение с животными разрешено.</p>

      <h2>Проживание в коттеджах</h2>
      <p>18 коттеджей в сосновом лесу — от 4-местных от 5 000 ₽/сутки до больших на компанию 8–10 человек. В каждом коттедже: своя кухня с индукцией и холодильником, душевая, тёплый пол, Smart TV, терраса, Wi-Fi. Бельё, полотенца и чай/кофе включены.</p>

      <h2>Баня и джакузи</h2>
      <p>Две дровяные парные на 6 человек каждая, два гидромассажных джакузи на свежем воздухе — работают круглый год. От 4 500 ₽ за 3 часа.</p>

      <h2>Ресторан и площадка для мероприятий</h2>
      <p>Деревянный банкетный зал с панорамными окнами в сосновый лес, бар «TRAVA», летняя терраса. До 60 гостей. Принимаем корпоративы, свадьбы, дни рождения и тимбилдинги — со сценой, звуком и проживанием в коттеджах.</p>

      <h2>Активности</h2>
      <p>Летом: бассейн, прокат велосипедов, мотоциклов и квадроциклов, волейбол, футбол, открытый тренажёрный зал, детская площадка, мини-зоопарк. Зимой: трансфер на горнолыжные курорты Красное озеро (15 мин), Золотая долина (25 мин) и Игора (35 мин), снегоходные прогулки, баня после катания.</p>
